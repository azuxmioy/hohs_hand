model:
  base_model: "black-forest-labs/FLUX.1-Fill-dev"
  controlnet:
    num_layers: 2
    num_single_layers: 4
    in_channels: 64
    attention_head_dim: 128
    num_attention_heads: 24
    joint_attention_dim: 4096
    pooled_projection_dim: 768
    guidance_embeds: true

training:
  image_size: 512
  batch_size: 1
  gradient_accumulation_steps: 4
  num_train_epochs: 200
  lr: 1.0e-4
  lr_warmup_steps: 100
  mixed_precision: bf16
  gradient_checkpointing: true
  save_every_iters: 1000
  log_every: 10
  eval_every_iters: 500
  num_eval_samples: 4
  num_inference_steps: 30
  max_grad_norm: 1.0
  controlnet_conditioning_scale: 1.0

data:
  latent_cache: /data/hohs2/datasets/data_latents_512.h5
  num_workers: 4
  val_split: 0.1

logging:
  project: hohs_hand_flux
  run_name: flux_fill_controlnet_512

output:
  dir: /data/hohs2/outputs/flux_controlnet_512
  checkpoints: /data/hohs2/checkpoints/flux_controlnet_512
  embeddings_cache: /data/hohs2/outputs/flux_controlnet/text_embeddings.pt

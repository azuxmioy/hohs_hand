model:
  base_model: "black-forest-labs/FLUX.1-Fill-dev"
  controlnet:
    # Small ControlNet to fit alongside NF4-quantized FLUX (6 GB)
    num_layers: 2
    num_single_layers: 4
    # 64 = packed VAE latents (16ch × 2x2 patch). ControlNet receives only the
    # noisy latents; the masked-image concatenation happens inside the transformer.
    in_channels: 64
    attention_head_dim: 128
    num_attention_heads: 24
    joint_attention_dim: 4096
    pooled_projection_dim: 768
    guidance_embeds: true   # FLUX.1-Fill-dev uses guidance; must match to avoid sig mismatch

training:
  image_size: 256
  batch_size: 1
  gradient_accumulation_steps: 4    # effective batch = num_gpus * batch_size * grad_accum
  num_train_epochs: 200
  lr: 1.0e-4
  lr_warmup_steps: 100
  mixed_precision: bf16
  gradient_checkpointing: true
  save_every: 20
  log_every: 10
  eval_every: 10          # run inference and log images every N epochs
  num_eval_samples: 4     # number of val samples to visualise
  num_inference_steps: 20 # Euler steps during inference
  max_grad_norm: 1.0
  controlnet_conditioning_scale: 1.0

data:
  hdf5_path: /data/hohs2/datasets/data.h5
  num_workers: 4
  val_split: 0.1
  # Composite condition: skeleton overlaid on UV map
  condition_mode: skeleton_on_uv   # options: skeleton_on_uv | uv_only | skeleton_only

logging:
  project: hohs_hand_flux
  run_name: flux_fill_controlnet

output:
  dir: /data/hohs2/outputs/flux_controlnet
  checkpoints: /data/hohs2/checkpoints/flux_controlnet
  embeddings_cache: /data/hohs2/outputs/flux_controlnet/text_embeddings.pt

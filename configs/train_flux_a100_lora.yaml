model:
  base_model: "black-forest-labs/FLUX.1-Fill-dev"
  controlnet:
    num_layers: 2
    num_single_layers: 4
    in_channels: 64
    attention_head_dim: 128
    num_attention_heads: 24
    joint_attention_dim: 4096
    pooled_projection_dim: 768
    guidance_embeds: true

training:
  image_size: 512
  batch_size: 2                       # smaller because LoRA grads add memory
  gradient_accumulation_steps: 4      # effective batch = 8
  num_train_epochs: 200
  lr: 1.0e-4
  lr_warmup_steps: 100
  mixed_precision: bf16
  gradient_checkpointing: false
  save_every_iters: 2000
  log_every: 10
  eval_every_iters: 1000
  num_eval_samples: 4
  num_inference_steps: 30
  max_grad_norm: 1.0
  controlnet_conditioning_scale: 1.0
  lora:
    rank: 32
    alpha: 32
    target_modules:
      - to_q
      - to_k
      - to_v
      - to_out.0
      - add_q_proj
      - add_k_proj
      - add_v_proj
      - to_add_out

data:
  hdf5_path: ${oc.env:DATA_DIR,/data/${oc.env:USER}}/datasets/data.h5
  num_workers: 2
  val_split: 0.1

logging:
  project: hohs_hand_flux
  run_name: flux_fill_controlnet_lora

output:
  dir: ${oc.env:DATA_DIR,/data/${oc.env:USER}}/outputs/flux_controlnet_lora
  checkpoints: ${oc.env:DATA_DIR,/data/${oc.env:USER}}/checkpoints/flux_controlnet_lora
  embeddings_cache: ${oc.env:DATA_DIR,/data/${oc.env:USER}}/outputs/flux_controlnet/text_embeddings.pt

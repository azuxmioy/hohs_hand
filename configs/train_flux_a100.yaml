model:
  base_model: "black-forest-labs/FLUX.1-Fill-dev"
  controlnet:
    num_layers: 2
    num_single_layers: 4
    in_channels: 64
    attention_head_dim: 128
    num_attention_heads: 24
    joint_attention_dim: 4096
    pooled_projection_dim: 768
    guidance_embeds: true

training:
  image_size: 512
  batch_size: 2                       # A100 has the memory; larger micro-batch
  gradient_accumulation_steps: 2      # effective batch = 4
  num_train_epochs: 200
  lr: 2.0e-4
  lr_warmup_steps: 100
  mixed_precision: bf16
  gradient_checkpointing: false       # OFF for speed (A100 has the memory)
  save_every_iters: 200
  log_every: 10
  eval_every_iters: 100
  num_eval_samples: 4
  num_inference_steps: 30
  max_grad_norm: 1.0
  controlnet_conditioning_scale: 1.0

data:
  latent_cache: ${oc.env:DATA_DIR,/data/${oc.env:USER}}/datasets/data_latents_512.h5
  num_workers: 2
  val_split: 0.1

logging:
  project: hohs_hand_flux
  run_name: flux_fill_controlnet_a100

output:
  dir: ${oc.env:DATA_DIR,/data/${oc.env:USER}}/outputs/flux_controlnet_a100
  checkpoints: ${oc.env:DATA_DIR,/data/${oc.env:USER}}/checkpoints/flux_controlnet_a100
  embeddings_cache: ${oc.env:DATA_DIR,/data/${oc.env:USER}}/outputs/flux_controlnet/text_embeddings.pt

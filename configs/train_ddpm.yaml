defaults:
  - _self_

model:
  image_size: 64
  in_channels: 3
  out_channels: 3
  base_channels: 128
  channel_mults: [1, 2, 4, 8]
  num_res_blocks: 2
  attention_resolutions: [16, 8]
  dropout: 0.0

diffusion:
  timesteps: 1000
  beta_schedule: linear
  beta_start: 0.0001
  beta_end: 0.02
  prediction_type: epsilon

training:
  batch_size: 64
  num_epochs: 500
  lr: 2.0e-4
  lr_warmup_steps: 500
  mixed_precision: fp16
  gradient_accumulation_steps: 1
  save_every: 50
  log_every: 100
  eval_every: 500
  num_eval_samples: 64

data:
  dataset: cifar10
  data_dir: ./data
  num_workers: 4
  pin_memory: true

logging:
  project: hohs_hand_diffusion
  run_name: ddpm_baseline

output:
  dir: ./outputs
  checkpoints: ./outputs/checkpoints
